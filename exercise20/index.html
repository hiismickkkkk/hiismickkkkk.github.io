<!DOCTYPE html>
<html>
<head>
<style>
table, td, th{
border-collapse:collapse;
border: 1px solid black;
padding: 10px;
text-align: left;
}
th{
background-color: gray;
color: white;
}
tr:nth-child(even){background-color:yellow;}

div.fixed{
position:fixed;
top: 0;
right: 0;
width: 100px;
height: 100px;
border: 3px solid #73AD21;
}
</style>
</head>
<body>
<table>
<tr>
<th>Firstname</th>
<th>Lastname</th>
</tr>

<tr>
<td>1</td>
<td>1</td>
</tr>

<tr>
<td>2</td>
<td>2</td>
</tr>

<tr>
<td>3</td>
<td>3</td>
</tr>
</table>

<div class="fixed">
this div element has position: fixed;
</div>
</body>
</html>
