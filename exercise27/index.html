<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
* {
  box-sizing: border-box;
}
.column {
  float: left;
  width: 33%;
  padding: 20px;
}
.column1 {
  float: left;
  width: 100%;
  padding: 20px;
}
.row:after {
  content: "";
  display: table;
  clear: both;
}

@media screen and (max-width: 480px) {
  .column {
    width: 100%;
  }
}

</style>
</head>
<body>
<div class="row">
  <div class="column1" style="background-color:lightgreen;">
    <h2>Column 1</h2>
    <p>Some text..</p>
  </div>
</div>
<div class="row">
  <div class="column" style="background-color:#ccc;">
    <h2>Column 1</h2>
    <p>Some text..</p>
  </div>
  
  <div class="column" style="background-color:#ccc;">
    <h2>Column 1</h2>
    <p>Some text..</p>
  </div>
  
  <div class="column" style="background-color:#ccc;">
    <h2>Column 1</h2>
    <p>Some text..</p>
  </div>
</div>
  

</body>
</html>
